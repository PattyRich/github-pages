name: Deploy Frontend

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - 'apps/frontend/src/**'
      - 'apps/frontend/public/**'
      - 'apps/frontend/eslint.config.mjs'
      - 'apps/frontend/package.json'
      - 'apps/frontend/package-lock.json'
      - 'apps/frontend/tsconfig.json'
      - 'apps/frontend/vite.config.mjs'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json
          
      - name: Build Frontend
        working-directory: apps/frontend
        run: |
          npm ci
          npm run typecheck
          CI=false npm run build
          
      - name: Upload to Temp Directory
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_KEY }}
          source: "apps/frontend/dist/*"
          target: "/tmp/frontend-release-${{ github.sha }}"
          strip_components: 3

      - name: Deploy Frontend Safely
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_KEY }}
          script: |
            # Ensure the target directory exists
            mkdir -p /var/www/frontend
            
            # Sync new files to production seamlessly, deleting removed files
            rsync -a --delete /tmp/frontend-release-${{ github.sha }}/ /var/www/frontend/
            
            # Clean up temp directory
            rm -rf /tmp/frontend-release-${{ github.sha }}

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_DEPLOY_WEBHOOK is not set; skipping Discord notification."
            exit 0
          fi

          curl -fsS -H "Content-Type: application/json" \
            -d "{\"content\":\"<@197140022569205762> ${WORKFLOW_NAME} failed: ${RUN_URL}\"}" \
            "$DISCORD_WEBHOOK"
