name: Deploy Frontend

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - 'apps/frontend/src/**'
      - 'apps/frontend/public/**'
      - 'apps/frontend/index.html'
      - 'apps/frontend/eslint.config.mjs'
      - 'apps/frontend/package.json'
      - 'apps/frontend/package-lock.json'
      - 'apps/frontend/tsconfig.json'
      - 'apps/frontend/vite.config.ts'
      - 'apps/frontend/Dockerfile'
      - 'apps/frontend/install-release.sh'
      - 'docker-compose.prod.yml'
      - '.dockerignore'
      - 'nginx/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json
          
      - name: Typecheck Frontend
        working-directory: apps/frontend
        run: |
          npm ci
          npm run typecheck

      - name: Publish Frontend Release
        uses: appleboy/ssh-action@v1.0.3
        env:
          RELEASE_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_KEY }}
          envs: RELEASE_SHA
          script: |
            set -e
            cd /var/www/server/github-pages

            git fetch origin main
            git reset --hard origin/main

            docker compose -f docker-compose.prod.yml config >/tmp/praynr-compose-config.yml
            docker compose -f docker-compose.prod.yml build frontend nginx
            docker compose -f docker-compose.prod.yml run --rm --no-deps --entrypoint nginx nginx -t
            docker compose -f docker-compose.prod.yml run --rm --no-deps frontend "$RELEASE_SHA"

            if command -v systemctl >/dev/null 2>&1 && systemctl is-active --quiet nginx; then
              echo "Host nginx is still active; skipping Docker nginx start until cutover."
              echo "After stopping/disabling host nginx, run: docker compose -f docker-compose.prod.yml up -d --no-deps nginx"
            else
              nginx_container="$(docker compose -f docker-compose.prod.yml ps -q nginx)"

              if [ -z "$nginx_container" ] || ! docker inspect "$nginx_container" --format '{{range .Mounts}}{{println .Destination}}{{end}}' | grep -qx '/srv/frontend'; then
                echo "Starting Nginx with the shared frontend release volume."
                docker compose -f docker-compose.prod.yml up -d --no-deps nginx
                nginx_container="$(docker compose -f docker-compose.prod.yml ps -q nginx)"
              else
                echo "Keeping the running Nginx edge container in place."
              fi

              docker exec "$nginx_container" test -s /srv/frontend/current/index.html
              docker exec "$nginx_container" /usr/local/bin/reload-nginx-if-needed

              running_image="$(docker inspect "$nginx_container" --format '{{.Image}}')"
              desired_image="$(docker compose -f docker-compose.prod.yml images -q nginx 2>/dev/null || true)"
              if [ -z "$desired_image" ]; then
                echo "Nginx runtime image metadata is unavailable; skipping the optional staged-image comparison."
              elif [ "$desired_image" != "$running_image" ]; then
                echo "A newer Nginx runtime image is staged but was not applied automatically."
                echo "Recreate Nginx during a planned maintenance window to apply it."
              fi
            fi

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_DEPLOY_WEBHOOK is not set; skipping Discord notification."
            exit 0
          fi

          curl -fsS -H "Content-Type: application/json" \
            -d "{\"content\":\"<@197140022569205762> ${WORKFLOW_NAME} failed: ${RUN_URL}\"}" \
            "$DISCORD_WEBHOOK"
