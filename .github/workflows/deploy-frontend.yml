name: Deploy Frontend

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - 'apps/frontend/src/**'
      - 'apps/frontend/public/**'
      - 'apps/frontend/index.html'
      - 'apps/frontend/eslint.config.mjs'
      - 'apps/frontend/package.json'
      - 'apps/frontend/package-lock.json'
      - 'apps/frontend/tsconfig.json'
      - 'apps/frontend/vite.config.ts'
      - 'docker-compose.prod.yml'
      - '.dockerignore'
      - 'nginx/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json
          
      - name: Typecheck Frontend
        working-directory: apps/frontend
        run: |
          npm ci
          npm run typecheck

      - name: Rebuild Nginx Frontend Image
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_KEY }}
          script: |
            set -e
            cd /var/www/server/github-pages

            git fetch origin main
            git reset --hard origin/main

            docker compose -f docker-compose.prod.yml config >/tmp/praynr-compose-config.yml
            docker compose -f docker-compose.prod.yml build nginx
            docker compose -f docker-compose.prod.yml run --rm --no-deps nginx nginx -t

            if command -v systemctl >/dev/null 2>&1 && systemctl is-active --quiet nginx; then
              echo "Host nginx is still active; skipping Docker nginx start until cutover."
              echo "After stopping/disabling host nginx, run: docker compose -f docker-compose.prod.yml up -d --no-deps nginx"
            else
              docker compose -f docker-compose.prod.yml up -d --no-deps nginx
            fi

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_DEPLOY_WEBHOOK is not set; skipping Discord notification."
            exit 0
          fi

          curl -fsS -H "Content-Type: application/json" \
            -d "{\"content\":\"<@197140022569205762> ${WORKFLOW_NAME} failed: ${RUN_URL}\"}" \
            "$DISCORD_WEBHOOK"
