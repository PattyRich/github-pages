name: Weekly Container Maintenance

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly at midnight Sunday UTC
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  update-images:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and Update Third-Party Images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_KEY }}
          script: |
            set -e
            cd /var/www/server/github-pages
            # Pull latest third-party images.
            docker compose -f docker-compose.prod.yml pull mongo redis dozzle
            
            # Rebuild custom images with the latest base images. A refreshed Nginx
            # runtime is staged only; frontend deploys keep the live edge container
            # in place and report when a maintenance restart is pending.
            docker compose -f docker-compose.prod.yml build --pull api worker nginx
            
            # Recreate non-edge containers if anything changed.
            docker compose -f docker-compose.prod.yml up -d --remove-orphans mongo redis api worker dozzle
            # Optional: Clean up old images to save disk space
            docker image prune -f
