name: Weekly Container Maintenance

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly at midnight Sunday UTC
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  update-images:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and Update Third-Party Images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_KEY }}
          script: |
            set -e
            cd /var/www/server/github-pages
            # Pull latest third-party images.
            docker compose -f docker-compose.prod.yml pull mongo redis dozzle
            
            # Rebuild custom images with the latest base images.
            docker compose -f docker-compose.prod.yml build --pull api worker nginx
            
            # Recreate containers if anything changed. Before cutover, leave host nginx
            # in charge of ports 80/443 and skip the Docker nginx container.
            if command -v systemctl >/dev/null 2>&1 && systemctl is-active --quiet nginx; then
              docker compose -f docker-compose.prod.yml up -d --remove-orphans mongo redis api worker dozzle
            else
              docker compose -f docker-compose.prod.yml up -d --remove-orphans
            fi
            # Optional: Clean up old images to save disk space
            docker image prune -f
