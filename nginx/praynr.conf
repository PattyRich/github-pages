# 1. Redirect ALL HTTP traffic to HTTPS
server {
    listen 80;
    server_name praynr.com dozzle.praynr.com;
    return 301 https://$host$request_uri;
}

# 2. Main Site & API - praynr.com
server {
    listen 443 ssl;
    server_name praynr.com;
    
    # Security Whitelist (Cloudflare IPs)
    include /etc/nginx/cloudflare.conf;

    # SSL Settings
    ssl_certificate /etc/ssl/praynr-cert.pem;
    ssl_certificate_key /etc/ssl/praynr-private-key.pem;
    ssl_verify_client on;
    ssl_client_certificate /etc/ssl/cloudflare.crt;

    client_max_body_size 40M;
    access_log /var/log/nginx/nginx.vhost.access-praynr.log;
    error_log /var/log/nginx/nginx.vhost.error-praynr.log;

    # --- FRONTEND CONFIG ---
    root /var/www/frontend;
    index index.html;

    location / {
        # Check 1: Try to serve the request as a static file (image/js/css)
        # Check 2: Try to serve as a directory (finds index.html)
        # Check 3: If not found, send the request to the @backend (Flask API)
        try_files $uri $uri/ @backend;
    }

    location ~ ^/events/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-critical: disable buffering so events stream immediately
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }

    # --- API CONFIG ---
    location @backend {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 3. Dozzle Subdomain - dozzle.praynr.com
server {
    listen 443 ssl;
    server_name dozzle.praynr.com;
    include /etc/nginx/cloudflare.conf;

    ssl_certificate /etc/ssl/praynr-cert.pem;
    ssl_certificate_key /etc/ssl/praynr-private-key.pem;
    ssl_verify_client on;
    ssl_client_certificate /etc/ssl/cloudflare.crt;

    client_max_body_size 40M;
    access_log /var/log/nginx/dozzle.access.log;
    error_log /var/log/nginx/dozzle.error.log;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Critical for live logs)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
