map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

resolver 127.0.0.11 valid=30s ipv6=off;

# 1. Redirect ALL HTTP traffic to HTTPS
server {
    listen 80;
    server_name praynr.com dozzle.praynr.com;
    return 301 https://$host$request_uri;
}

# 2. Main Site & API - praynr.com
server {
    listen 443 ssl;
    server_name praynr.com;
    
    # Extract real visitor IP from Cloudflare header
    include /etc/nginx/cloudflare.conf;

    # SSL Settings
    ssl_certificate /etc/nginx/certs/praynr-cert.pem;
    ssl_certificate_key /etc/nginx/certs/praynr-private-key.pem;
    ssl_verify_client on;
    ssl_client_certificate /etc/nginx/certs/cloudflare.crt;

    client_max_body_size 40M;
    access_log /var/log/nginx/nginx.vhost.access-praynr.log;
    error_log /var/log/nginx/nginx.vhost.error-praynr.log;

    set $api_upstream http://api:8000;

    # --- FRONTEND CONFIG ---
    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /events/ {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-critical: disable buffering so events stream immediately
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }

    # --- API CONFIG ---
    location ^~ /lol/api/ {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /static/uploads/ {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(health|createBoard|feedback)$ {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(getBoard|updateBoard|updateTeams|auth)/ {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 3. Dozzle Subdomain - dozzle.praynr.com
server {
    listen 443 ssl;
    server_name dozzle.praynr.com;
    include /etc/nginx/cloudflare.conf;

    ssl_certificate /etc/nginx/certs/praynr-cert.pem;
    ssl_certificate_key /etc/nginx/certs/praynr-private-key.pem;
    ssl_verify_client on;
    ssl_client_certificate /etc/nginx/certs/cloudflare.crt;

    client_max_body_size 40M;
    access_log /var/log/nginx/dozzle.access.log;
    error_log /var/log/nginx/dozzle.error.log;

    set $dozzle_upstream http://dozzle:8080;

    location / {
        proxy_pass $dozzle_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Critical for live logs)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
