<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Create, manage, and share customizable Bingo boards. Perfect for OSRS, speedruns, and community events."
    />
    <script>
      (function () {
        if (window.location.hostname !== 'pattyrich.github.io') {
          return;
        }

        // Don't redirect /recents — let the app render so users can see their saved boards
        if (routePath === '/recents' || hash === '#/recents') {
          return;
        }

        var projectPath = '/github-pages';
        var pathname = window.location.pathname;
        var search = window.location.search;
        var hash = window.location.hash;
        var routePath = '/';

        if (pathname === projectPath || pathname.indexOf(projectPath + '/') === 0) {
          routePath = pathname.slice(projectPath.length) || '/';
        }

        if (hash.indexOf('#/github-pages') === 0) {
          hash = '#' + hash.slice('#/github-pages'.length);
          if (hash === '#') {
            hash = '#/';
          }
        }

        if (!hash && routePath !== '/') {
          hash = '#' + routePath + search;
          search = '';
        }

        window.location.replace('https://praynr.com/' + search + hash);
      })();
    </script>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://praynr.com/" />
    <meta
      property="og:title"
      content="OSRS Bingo & Community Tools | Custom Clan Bingo Generator"
    />
    <meta
      property="og:description"
      content="Create, manage, and share customizable OSRS Bingo boards for your clan or community."
    />
    <meta property="og:image" content="/board-min2.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://praynr.com/" />
    <meta
      property="twitter:title"
      content="OSRS Bingo & Community Tools | Custom Clan Bingo Generator"
    />
    <meta
      property="twitter:description"
      content="Create, manage, and share customizable OSRS Bingo boards for your clan or community."
    />
    <meta property="twitter:image" content="/board-min2.png" />
    <link rel="apple-touch-icon" href="/logo192.png" />

    <link rel="manifest" href="/manifest.json" />

    <title>OSRS Bingo & Community Tools | Custom Clan Bingo Generator</title>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
