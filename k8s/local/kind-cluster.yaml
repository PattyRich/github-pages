# Local Kubernetes cluster for learning with kind.
#
# This file only describes the cluster that kind should create. It does not
# deploy Praynr, MongoDB, Redis, or any app containers.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: praynr
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 8088
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
