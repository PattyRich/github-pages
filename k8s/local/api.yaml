apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: api-uploads
  namespace: praynr-local
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: praynr-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: praynr-api:local
          imagePullPolicy: Never
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secrets
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: api-uploads
              mountPath: /app/static/uploads
      volumes:
        - name: api-uploads
          persistentVolumeClaim:
            claimName: api-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: praynr-local
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
