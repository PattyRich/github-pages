services:
  mongo:
    image: mongo:7.0
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    build:
      context: ./services/api
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./services/api/.env
    volumes:
      - proof_uploads:/app/static/uploads
    depends_on:
      - mongo
      - redis
    command: uwsgi --ini server.ini
    restart: unless-stopped

  worker:
    build:
      context: ./services/api
    env_file:
      - ./services/api/.env
    depends_on:
      - redis
    command: rq worker --url redis://redis:6379/0 default
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dozzle_data:/data
      - ./dozzle/users.yml:/data/users.yml
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      DOZZLE_AUTH_PROVIDER: simple
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
  dozzle_data:
  proof_uploads:
